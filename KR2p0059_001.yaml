body:
  text: 齊景公疥且瘧逾歲不已會譴與梁丘據言於公曰吾幣帛甚美於吾先君之量矣吾珪璧大於吾先君之公疥且瘧逾歲不已是吾無良祝史也吾欲誅諸祝史公舉首答之倘然是吾所望於汝也盍誅之二子將是言也高子國子答曰身為親又何愛焉是信吾無良祝史公盍誅之晏子夕二大夫退公入晏子而告之若其告高子屈木為成于宋王命屈木問范武子之行焉文子答曰夫子使其私吏聽獄于晉邦溥迫情而不逾偷使其私祝史進蘊聖外內不廢可因於民者其祝史之為其君祝敚說也正言君祝敚說毋如尃陳情忍罪乎則言不聽情不獲如順言弇惡乎則恐後誅于史者故其祝史制篾篿折祝之多愚言明德觀行物而祟者也非為美玉肴牲也今內寵有割外亦有梁丘據營誑公退納武夫惡聖人播浧盈藏篤使亡矣而揚清者與得萬福焉今君之貪昏苛慝辟違詛為無傷祝亦無益今薪蒸使虞守之澤梁使守之山林使衡守之舉邦為欽禁約挾諸關縛纓諸市眾其左右相頌自善曰蓋必死偷為樂乎故死期將至何仁故內寵之妾迫奪于國外寵之臣出矯於鄙自姑尤以西聊攝以東其人數多已是皆貧苦約疾夫婦皆詛一丈夫執尋之幣三布之玉雖是夫二夫何不受皇則未得與聞公強起違席曰善哉吾子晏子是襄桓之言也祭貞不獲祟以至於此神見吾淫暴請祭與貞
